name: .NET Desktop CI/CD

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: "9.0.x"
  BUILD_CONFIGURATION: Release
  RUNTIME_ID: win-x64
  PUBLISH_DIR: out/publish/win-x64
  INSTALLER_DIR: out/installer

jobs:
  build:
    name: Build And Publish
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore .\NetworkMonitor.csproj --runtime $env:RUNTIME_ID

      - name: Build
        run: dotnet build .\NetworkMonitor.csproj --configuration $env:BUILD_CONFIGURATION --runtime $env:RUNTIME_ID --no-restore

      - name: Publish
        run: dotnet publish .\NetworkMonitor.csproj --configuration $env:BUILD_CONFIGURATION --runtime $env:RUNTIME_ID --self-contained true -p:PublishSingleFile=true --no-restore -o $env:PUBLISH_DIR

      - name: Upload Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetworkMonitor-publish-${{ env.RUNTIME_ID }}
          path: ${{ env.PUBLISH_DIR }}
          if-no-files-found: error

  release:
    name: Package And Release
    runs-on: windows-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Inno Setup
        run: winget install JRSoftware.InnoSetup -e --accept-package-agreements --accept-source-agreements

      - name: Resolve Inno Setup Compiler
        id: iscc
        shell: pwsh
        run: |
          $paths = @(
            "$Env:ProgramFiles(x86)\Inno Setup 6\ISCC.exe",
            "$Env:ProgramFiles\Inno Setup 6\ISCC.exe"
          )
          $compiler = $paths | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $compiler) {
            throw "ISCC.exe was not found after installing Inno Setup."
          }
          "path=$compiler" | Out-File -FilePath $Env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build Installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          .\build-installer.ps1 -Version $version -Configuration $Env:BUILD_CONFIGURATION -Runtime $Env:RUNTIME_ID -InnoSetupCompiler "${{ steps.iscc.outputs.path }}"

      - name: Archive Publish Output
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $zipPath = Join-Path $PWD "NetworkMonitor-$version-${Env:RUNTIME_ID}.zip"
          Compress-Archive -Path "$Env:PUBLISH_DIR\*" -DestinationPath $zipPath -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ env.INSTALLER_DIR }}\NetworkMonitor-Setup-*.exe
            NetworkMonitor-*.zip
