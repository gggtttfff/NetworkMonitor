name: .NET Desktop CI/CD

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: "9.0.x"
  BUILD_CONFIGURATION: Release
  RUNTIME_ID: win-x64
  PUBLISH_DIR: out/publish/win-x64
  INSTALLER_DIR: out/installer

jobs:
  build:
    name: Build And Publish
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Resolve Build Version
        id: app_version
        shell: pwsh
        run: |
          if ("${{ github.ref }}".StartsWith("refs/tags/v")) {
            $version = "${{ github.ref_name }}".TrimStart('v')
          } else {
            [xml]$projectXml = Get-Content -Path ".\NetworkMonitor.csproj" -Encoding UTF8
            $version = $projectXml.Project.PropertyGroup.Version | Select-Object -First 1
          }
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Build version could not be resolved."
          }
          "value=$version" | Out-File -FilePath $Env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore
        run: dotnet restore .\NetworkMonitor.csproj --runtime $env:RUNTIME_ID

      - name: Build
        run: dotnet build .\NetworkMonitor.csproj --configuration $env:BUILD_CONFIGURATION --runtime $env:RUNTIME_ID -p:Version=${{ steps.app_version.outputs.value }} -p:InformationalVersion=${{ steps.app_version.outputs.value }} --no-restore

      - name: Publish
        run: dotnet publish .\NetworkMonitor.csproj --configuration $env:BUILD_CONFIGURATION --runtime $env:RUNTIME_ID --self-contained true -p:PublishSingleFile=true -p:Version=${{ steps.app_version.outputs.value }} -p:InformationalVersion=${{ steps.app_version.outputs.value }} --no-restore -o $env:PUBLISH_DIR

      - name: Upload Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetworkMonitor-publish-${{ env.RUNTIME_ID }}
          path: ${{ env.PUBLISH_DIR }}
          if-no-files-found: error

  release:
    name: Package And Release
    runs-on: windows-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Resolve Release Version
        id: app_version
        shell: pwsh
        run: |
          if ("${{ github.ref }}".StartsWith("refs/tags/v")) {
            $version = "${{ github.ref_name }}".TrimStart('v')
          } else {
            [xml]$projectXml = Get-Content -Path ".\NetworkMonitor.csproj" -Encoding UTF8
            $version = $projectXml.Project.PropertyGroup.Version | Select-Object -First 1
          }
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Release version could not be resolved."
          }
          "value=$version" | Out-File -FilePath $Env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Debug Inno Setup Paths
        shell: pwsh
        run: |
          Write-Host "ChocolateyInstall=$Env:ChocolateyInstall"
          Write-Host "ProgramData=$Env:ProgramData"
          $debugRoots = @(
            "$Env:ChocolateyInstall",
            "$Env:ProgramData\chocolatey",
            "$Env:ProgramFiles(x86)",
            "$Env:ProgramFiles",
            "$Env:LOCALAPPDATA\Programs"
          )
          foreach ($root in $debugRoots) {
            if (Test-Path $root) {
              Write-Host "Searching: $root"
              Get-ChildItem -Path $root -Filter ISCC.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName
            }
          }

      - name: Resolve Inno Setup Compiler
        id: iscc
        shell: pwsh
        run: |
          $paths = @(
            "$Env:ChocolateyInstall\bin\ISCC.exe",
            "$Env:ChocolateyInstall\lib\innosetup\tools\ISCC.exe",
            "$Env:ProgramData\chocolatey\bin\ISCC.exe",
            "$Env:ProgramData\chocolatey\lib\innosetup\tools\ISCC.exe",
            "$Env:ProgramFiles(x86)\Inno Setup 6\ISCC.exe",
            "$Env:ProgramFiles\Inno Setup 6\ISCC.exe",
            "$Env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe"
          )
          $compiler = $paths | Where-Object { $_ -and (Test-Path $_) } | Select-Object -First 1
          if (-not $compiler) {
            $searchRoots = @(
              "$Env:ChocolateyInstall",
              "$Env:ProgramData\chocolatey",
              "$Env:ProgramFiles(x86)",
              "$Env:ProgramFiles",
              "$Env:LOCALAPPDATA\Programs"
            )
            foreach ($root in $searchRoots) {
              if (Test-Path $root) {
                $compiler = Get-ChildItem -Path $root -Filter ISCC.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName -First 1
                if ($compiler) {
                  break
                }
              }
            }
          }
          if (-not $compiler) {
            throw "ISCC.exe was not found after installing Inno Setup."
          }
          "path=$compiler" | Out-File -FilePath $Env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build Installer
        shell: pwsh
        run: |
          .\build-installer.ps1 -Version "${{ steps.app_version.outputs.value }}" -Configuration $Env:BUILD_CONFIGURATION -Runtime $Env:RUNTIME_ID -InnoSetupCompiler "${{ steps.iscc.outputs.path }}"

      - name: Archive Publish Output
        shell: pwsh
        run: |
          $version = "${{ steps.app_version.outputs.value }}"
          $zipPath = Join-Path $PWD "NetworkMonitor-$version-${Env:RUNTIME_ID}.zip"
          Compress-Archive -Path "$Env:PUBLISH_DIR\*" -DestinationPath $zipPath -Force

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetworkMonitor-installer-${{ steps.app_version.outputs.value }}
          path: ${{ env.INSTALLER_DIR }}/NetworkMonitor-Setup-*.exe
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ env.INSTALLER_DIR }}/NetworkMonitor-Setup-*.exe
            NetworkMonitor-*.zip
