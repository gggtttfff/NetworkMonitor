# 网络监控工具 CI/CD 工作流
# 作用：
# 1. 每次推送代码时自动编译项目
# 2. 创建发布版本时自动打包 exe 文件
# 3. 上传构建产物到 GitHub Actions

name: .NET Desktop

on:
  # 推送到 master 分支时触发
  push:
    branches: [ "master" ]
  # 创建 Pull Request 时触发
  pull_request:
    branches: [ "master" ]
  # 手动触发
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    # 检出代码
    - uses: actions/checkout@v4

    # 安装 .NET 9 SDK
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    # 还原 NuGet 包
    - name: Restore dependencies
      run: dotnet restore

    # 编译项目
    - name: Build
      run: dotnet build --no-restore --configuration Release

    # 发布单文件 exe
    - name: Publish
      run: dotnet publish --no-build --configuration Release --output ./publish

    # 上传构建产物
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: NetworkMonitor
        path: ./publish/*.exe

  # 打标签时创建发布
  release:
    needs: build
    runs-on: windows-latest
    # 只有打标签时才执行
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish
      run: dotnet publish --configuration Release --output ./publish

    # 打包成 zip
    - name: Zip artifact
      run: Compress-Archive -Path ./publish/* -DestinationPath NetworkMonitor.zip

    # 创建 GitHub Release
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: NetworkMonitor.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
